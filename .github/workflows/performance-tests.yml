name: Performance Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'

jobs:
  performance:
    name: Load Testing (k6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Start application
        run: npm start &
        env:
          NEXT_TELEMETRY_DISABLED: 1
          PORT: 3000

      - name: Wait for application
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000/api/health; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 2
          done
          echo "Application failed to start"
          exit 1

      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run performance tests
        run: k6 run scripts/performance/load-test.js
        env:
          BASE_URL: http://localhost:3000

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6-results.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('k6-results.json', 'utf8'));
            const comment = `## Performance Test Results
            
            - **VUs**: ${results.metrics.vus?.value || 'N/A'}
            - **Duration**: ${results.metrics.duration?.value || 'N/A'}
            - **Requests**: ${results.metrics.http_reqs?.value || 'N/A'}
            - **Errors**: ${results.metrics.http_req_failed?.value || 0}
            - **P95 Latency**: ${results.metrics.http_req_duration?.values?.p95 || 'N/A'}ms
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
