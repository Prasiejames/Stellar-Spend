<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Stellar-Spend</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      text-align: center;
      background: rgba(17, 17, 17, 0.8);
      border: 1px solid #333333;
      border-radius: 8px;
      padding: 40px 30px;
      backdrop-filter: blur(10px);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.8;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #c9a962;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #999999;
      margin-bottom: 24px;
    }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      color: #666666;
      margin-bottom: 30px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #b91c1c;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    button {
      padding: 12px 24px;
      border: 1px solid #c9a962;
      background: transparent;
      color: #c9a962;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    button:hover {
      background: #c9a962;
      color: #0a0a0a;
    }
    button:active {
      transform: scale(0.98);
    }
    .secondary {
      border-color: #555555;
      color: #555555;
    }
    .secondary:hover {
      background: #555555;
      color: #ffffff;
    }
    .tips {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #333333;
      text-align: left;
    }
    .tips h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #777777;
      margin-bottom: 12px;
    }
    .tips ul {
      list-style: none;
      font-size: 13px;
      color: #666666;
      line-height: 1.8;
    }
    .tips li:before {
      content: "→ ";
      color: #c9a962;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Stellar-Spend requires an internet connection to convert stablecoins and process transactions.</p>
    
    <div class="status">
      <span class="status-dot"></span>
      <span>Waiting for connection...</span>
    </div>

    <div class="actions">
      <button onclick="location.reload()">Try Again</button>
      <button class="secondary" onclick="goHome()">Go Home</button>
    </div>

    <div class="tips">
      <h3>What You Can Do</h3>
      <ul>
        <li>Check your internet connection</li>
        <li>Review your transaction history (cached)</li>
        <li>Prepare your bank details for when you're online</li>
      </ul>
    </div>
  </div>

  <script>
    function goHome() {
      window.location.href = '/';
    }

    // Listen for connection restoration
    window.addEventListener('online', function() {
      location.reload();
    });

    // Check connection status periodically
    setInterval(function() {
      fetch('/api/health', { method: 'HEAD', cache: 'no-store' })
        .then(() => location.reload())
        .catch(() => {});
    }, 5000);
  </script>
</body>
</html>
