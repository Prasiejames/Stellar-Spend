# Green environment — port 3001
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: stellar-spend:${IMAGE_TAG:-latest}
    container_name: stellar-spend-green
    ports:
      - "3001:3000"
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
